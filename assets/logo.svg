<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7C5CFF"/>
      <stop offset="0.55" stop-color="#5B6CFF"/>
      <stop offset="1" stop-color="#3AA0FF"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E6ECFF"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#1A2A6B" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- 스퀴클(둥근 사각) 배경 -->
  <path fill="url(#bg)" d="M512 64
    C 246 64 64 246 64 512
    C 64 778 246 960 512 960
    C 778 960 960 778 960 512
    C 960 246 778 64 512 64 Z"/>

  <!-- 위쪽 광택 -->
  <path fill="#FFFFFF" opacity="0.10" d="M512 64 C 246 64 64 246 64 512 C 280 320 520 300 760 360 C 880 392 940 470 960 512 C 960 246 778 64 512 64 Z"/>

  <g filter="url(#soft)">
    <!-- 다운로드 화살표 (재생 삼각형을 아래로 향하게 변형) -->
    <path fill="url(#arrow)" d="M452 300
      h120 v176 h118
      a16 16 0 0 1 12 27
      L 524 690
      a16 16 0 0 1 -24 0
      L 322 503
      a16 16 0 0 1 12 -27
      h118 Z"/>
    <!-- 받침대(트레이) -->
    <rect x="318" y="706" width="388" height="62" rx="31" fill="url(#arrow)"/>
  </g>
</svg>
